<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PhishGuard AI - Scan History</title>
    <link rel="stylesheet" href="history.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>PhishGuard AI</h1>
            </div>
            <h2>Scan History Dashboard</h2>
            <p>View all your previously scanned URLs and Emails</p>
        </header>

        <main>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Time</th>
                            <th>URL / Target</th>
                            <th>Risk Score</th>
                            <th>Classification</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr>
                            <td colspan="5" style="text-align: center;">Loading history...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div id="error-message" class="error" style="display: none;"></div>
        </main>
    </div>
    <script src="history.js"></script>
</body>
</html>
